<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CO2 Emissions by City</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

    body {
        font-family: 'Inter', sans-serif;

        background: linear-gradient(
            135deg,
            #814587,
            #814587,
            #814587
        );

        margin: 0;
        padding: 40px;

        color: #111827;
    }

    h1 {
        text-align: center;

        font-size: 42px;
        font-weight: 800;

        margin-bottom: 35px;

        color: #0f172a;
    }
    

    form {

        background: rgba(255,255,255,0.85);

        backdrop-filter: blur(10px);

        padding: 20px;

        border-radius: 18px;

        margin-bottom: 25px;

        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    select,
    input,
    button {

        font-family: 'Inter', sans-serif;

        padding: 10px 14px;

        color: #000000;

        margin: 8px;

        border-radius: 10px;

        border: 1px solid #cbd5e1;

        font-size: 15px;
    }

    button {

        background: #14b8a6;

        color: black;

        border: none;

        font-weight: 700;

        cursor: pointer;

        transition: 0.2s;
    }

    button:hover {

        background: #0f766e;

        transform: translateY(-1px);
    }

    canvas {

        background: rgba(255,255,255,0.9);

        border-radius: 20px;

        padding: 20px;

        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

</style>
</head>
<body class="p-4 h-screen flex flex-col">

<body class="p-4 h-screen flex flex-col">

    {% if error %}
    <div style="background-color: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: 600; text-align: center;">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <div class="flex flex-wrap items-center justify-between gap-4 mb-6 bg-white/80 bgit add templates/index.html c02_emissions_tracker.py
    ackdrop-blur-md p-4 rounded-2xl border border-slate-200 shadow-sm">
        <h1 class="text-xl font-800 tracking-tight text-slate-800">CO₂ Emissions Tracker</h1>


    <form method="POST">
        <button type="submit" name="reset" value="1" class="bg-teal-500 hover:bg-teal-600 text-white font-bold px-4 py-2 rounded-lg transition-all">
        Reset All Emissions
        </button>
    </form>

    <form method="POST" class="flex flex-wrap items-center gap-2 color=#000000 bg-transparent shadow-none p-0 m-0">
        City:
        <select name="city" required>
            <option value="" disabled selected>Select a city</option>
            <option>Austin</option>
            <option>Dallas</option>
            <option>Houston</option>
            <option>San Antonio</option>
            <option>El Paso</option>
            <option>Fort Worth</option>
            <option>Arlington</option>
            <option>Corpus Christi</option>
            <option>Plano</option>
            <option>Laredo</option>
            <option>Garland</option>
            <option>Irving</option>
            <option>Amarillo</option>
            <option>Grand Prairie</option>
            <option>McKinney</option>
            <option>Frisco</option>
            <option>Brownsville</option>
            <option>Pasadena</option>
            <option>Mesquite</option>
            <option>Killeen</option>
        </select>
        Distance (km): <input type="number" step="0.1" name="distance" required>
       
        Vehicle:
        <select name="vehicle">
            <option>Gasoline</option>
            <option>Diesel</option>
            <option>Hybrid</option>
            <option>Electric</option>
        </select>
        <button type="submit" class="bg-teal-500 hover:bg-teal-600 text-white font-bold px-4 py-2 rounded-lg transition-all">Add Trip</button>
    </form>


    <canvas id="emissionChart" width="900" height="400"></canvas>


    <script>
        const labels = {{ labels|tojson }};
        const data = {{ values|tojson }};
        const ctx = document.getElementById('emissionChart').getContext('2d');


        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'CO₂ Emission (kg)',
                    data: data,
                    backgroundColor: 'rgba(75, 192, 192, 0.5)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                plugins: {
                     tooltip: {
                        enabled: true,
                        bodyFont: {
                        family: 'Inter' },
                        titleFont: {
                            family: 'Inter'
                        }
                     },

                    legend: {
                        display: false,
                        labels: {
                        font: {
                            family: 'Inter'
                        }
                        }
                    }
                },

                scales: {

                    y: {

                        beginAtZero: true,
                        suggestedMax: Math.max(...data) + 500,
                        title: {
                            display: true,
                            text: 'CO₂ Emission (kg)',
                            font: {
                                family: 'Inter',
                                size: 16,
                                weight: '700'
                         }
                        },
                        ticks: {
                            font: {
                                    family: 'Inter',
                                    size: 12,
                                    weight: '600',
                                    color: '#000000'
                                }
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'City',
                            font: {
                                family: 'Inter',
                                size: 16,
                                weight: '700'
                            }
                        },
                
                        ticks: {
                            font: {
                                family: 'Inter',
                                size: 11,
                                weight: '700',
                                color: '#000000'

                            }
                        }
                    }
                }
            }
        }

        );
    </script>
</body>
</html>
